<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="meddoc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Rounded Card -->
  <rect width="512" height="512" rx="128" fill="url(#meddoc-grad)" />
  
  <!-- Medical Heartbeat Line (Glow and Main) -->
  <path 
    d="M 64 256 L 176 256 L 208 160 L 240 368 L 272 80 L 304 304 L 336 256 L 448 256" 
    stroke="white" 
    stroke-width="36" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
    fill="none"
    filter="url(#glow)"
  />
</svg>
